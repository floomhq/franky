name: Fede feedback
description: Report confusing output, missing guidance, or friction while using Fede.
title: "Feedback: "
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What felt confusing, missing, or annoying?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What were you trying to build or decide?
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected
      description: What answer, flow, or help would have been more useful?
    validations:
      required: false
  - type: textarea
    id: actual
    attributes:
      label: Actual
      description: What did Fede do instead?
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: This report contains no secrets, credentials, private customer data, or confidential names.
          required: true
